<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business OS</title>
<style>
:root {
  --bg:#f5f0e8; --surface:#faf7f2; --sidebar-bg:#1c2b1e; --sidebar-text:#c8d5c9;
  --sidebar-active:#2d4a30; --sidebar-hover:#243b27; --border:#ddd6c8;
  --border-light:#e8e2d8; --text:#1a1a14; --muted:#7a7060; --dim:#5a5448;
  --accent:#2d4a30; --gold:#b8982a; --topbar-bg:#1c2b1e; --topbar-text:#f5f0e8;
  --input:#faf7f2; --th:#ede8de; --row-hover:#f4efe6; --hover:#ede8e0;
  --active:#e4ddd2; --mo-total:#ede8dc; --grand:#e4ddd0;
}
[data-theme="dark"] {
  --bg:#111510; --surface:#1a1f1b; --sidebar-bg:#0d1410; --sidebar-text:#a8b8a9;
  --sidebar-active:#1e3020; --sidebar-hover:#182818; --border:#2a3028;
  --border-light:#222820; --text:#e8e4da; --muted:#7a8070; --dim:#98a090;
  --accent:#4a7a50; --gold:#c9a84c; --topbar-bg:#0d1410; --topbar-text:#e8e4da;
  --input:#1e2420; --th:#1e2420; --row-hover:#1e231f; --hover:#222820;
  --active:#2a3028; --mo-total:#1e2820; --grand:#222a24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;transition:background .2s,color .2s}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--sidebar-bg);padding:20px 0;flex-shrink:0;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:0;padding:0}
.sidebar.collapsed *{display:none}
#sidebarToggle{opacity:.6;transition:opacity .15s}
#sidebarToggle:hover{opacity:1}
.sidebar-logo{font-size:11px;font-weight:800;color:var(--gold);padding:0 20px 16px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--sidebar-text);border-radius:4px;margin:1px 8px;transition:background .12s;font-size:13.5px;user-select:none;border-left:3px solid transparent}
.nav-item:hover{background:var(--sidebar-hover);color:#ddeedd}
.nav-item.active{background:var(--sidebar-active);color:#e8f4e8;font-weight:500;border-left-color:var(--gold)}
.nav-icon{width:20px;display:flex;align-items:center;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--topbar-bg);padding:0 14px 0 24px;display:flex;align-items:center;justify-content:space-between;min-height:56px;flex-shrink:0;gap:10px}
.topbar-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:24px}
.app-title{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.ctrl{display:flex;align-items:center;gap:6px}
.ctrl-label{font-size:12px;color:var(--sidebar-text)}
.pill{background:transparent;border:1px solid rgba(200,213,201,.3);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600;color:var(--topbar-text);transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.accountant{border-color:#4a7a50;color:#a8d0a8}
.icon-btn{background:transparent;border:1px solid rgba(200,213,201,.3);border-radius:6px;padding:5px 8px;cursor:pointer;color:var(--topbar-text);transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
select.topbar-select{background:transparent;border:1px solid rgba(200,213,201,.3);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--topbar-text);cursor:pointer;min-width:82px;max-width:82px}
select.topbar-select option{background:var(--sidebar-bg);color:var(--topbar-text)}
.topbar-right .btn{background:transparent;border:1px solid rgba(200,213,201,.25);color:var(--topbar-text);font-size:12px}
.topbar-right .btn:hover{border-color:var(--gold);color:var(--gold);background:transparent}
.topbar-right .btn-danger{background:transparent;border-color:rgba(220,120,120,.3);color:#e8a8a8}
.topbar-right .btn-danger:hover{border-color:#e08888;color:#e08888;background:transparent}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap input{background:rgba(255,255,255,.07);border:1px solid rgba(200,213,201,.2);border-radius:20px;padding:5px 12px 5px 32px;font-size:13px;color:var(--topbar-text);width:170px;transition:width .2s,border-color .15s;font-family:inherit}
.search-wrap input::placeholder{color:rgba(200,213,201,.72)}
.search-wrap input:focus{outline:none;border-color:var(--gold);width:230px}
.search-icon-lbl{position:absolute;left:10px;pointer-events:none;color:rgba(200,213,201,.45);display:flex;align-items:center}
#searchDropdown{display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:600;overflow:hidden;max-height:340px;overflow-y:auto;min-width:280px}
.search-result{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;color:var(--text)}
.search-result:hover{background:var(--hover)}
.search-result-icon{flex-shrink:0;color:var(--muted);display:flex;align-items:center}
.search-result-text strong{display:block;font-size:13px;color:var(--text)}
.search-result-text span{font-size:11px;color:var(--muted)}
.search-no-results{padding:14px;font-size:13px;color:var(--muted);text-align:center}
.reminders-wrap{flex-shrink:0}
.banner{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;font-size:13px;font-weight:500}
.banner.invoice{background:#fffbf0;border-bottom:1px solid #e8d88a;color:#7a6010}
.banner.tax{background:#fdf0f0;border-bottom:1px solid #e8aaaa;color:#803030}
.banner-dismiss{background:none;border:none;cursor:pointer;font-size:18px;color:inherit;opacity:.5;line-height:1;padding:0 2px}
.banner-dismiss:hover{opacity:1}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap}
.section-header-actions{display:flex;gap:8px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.card-companies{border-left:3px solid #4a7a50}
.card-contracts{border-left:3px solid #b8982a}
.card-invoices{border-left:3px solid #4a6b8a}
.card-summary{border-left:3px solid #6b4a8a}
.card-documents{border-left:3px solid #8a4a4a}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .12s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#e8f0e8;border:1px solid transparent}
.btn-primary:hover{background:#243b27}
.btn-secondary{background:var(--surface);color:var(--dim);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--hover)}
.btn-danger{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.btn-danger:hover{background:#fecaca}
.btn-success{background:rgba(45,74,48,.1);color:#2d6030;border:1px solid rgba(45,74,48,.25)}
.btn-success:hover{background:rgba(45,74,48,.18)}
.btn-warning{background:rgba(184,152,42,.1);color:#7a6010;border:1px solid rgba(184,152,42,.3)}
.btn-warning:hover{background:rgba(184,152,42,.18)}
.btn-copy{background:rgba(91,33,182,.07);color:#5b21b6;border:1px solid rgba(91,33,182,.18)}
.btn-copy:hover{background:rgba(91,33,182,.13)}
.btn-dup{background:rgba(3,105,161,.07);color:#0369a1;border:1px solid rgba(3,105,161,.2)}
.btn-dup:hover{background:rgba(3,105,161,.13)}
.btn-sm{padding:4px 8px;font-size:11px;white-space:nowrap}
.action-cell{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--th);text-align:left;padding:10px 14px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle;font-variant-numeric:tabular-nums;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.td-notes{max-width:200px}
td.td-actions{white-space:nowrap;overflow:visible;max-width:none}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--row-hover)}
.text-right{text-align:right}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.badge-active,.badge-paid{background:#e8f0e8;color:#2d5a30;border:1px solid #c8ddc8}
.badge-sent{background:#e8eef5;color:#2a4060;border:1px solid #c0cfe0}
.badge-draft{background:#f0ece0;color:#6a5e40;border:1px solid #ddd0b0}
.badge-completed,.badge-former{background:#eeebe5;color:#5a5448;border:1px solid #d8d0c4}
.badge-terminated{background:#f5e8e8;color:#7a2828;border:1px solid #e0c0c0}
.badge-ipreg{background:#eeebf5;color:#4a3a70;border:1px solid #d0c8e8}
.badge-bank{background:#e8eef5;color:#2a4060;border:1px solid #c0cfe0}
.badge-contract{background:#f5f0e0;color:#6a5010;border:1px solid #e0d0a0}
.badge-other{background:#eeebe5;color:#5a5448;border:1px solid #d8d0c4}
[data-theme="dark"] .badge-active,[data-theme="dark"] .badge-paid{background:rgba(45,90,48,.25);color:#90c890;border-color:rgba(45,90,48,.4)}
[data-theme="dark"] .badge-sent{background:rgba(42,64,96,.3);color:#90b0d8;border-color:rgba(42,64,96,.5)}
[data-theme="dark"] .badge-draft{background:rgba(106,94,64,.2);color:#c8b880;border-color:rgba(106,94,64,.35)}
[data-theme="dark"] .badge-completed,[data-theme="dark"] .badge-former{background:rgba(90,84,72,.2);color:#a8a090;border-color:rgba(90,84,72,.35)}
[data-theme="dark"] .badge-terminated{background:rgba(122,40,40,.25);color:#e09090;border-color:rgba(122,40,40,.4)}
tr.row-paid td{background:rgba(45,90,48,.03)}
tr.row-sent td{background:rgba(42,64,96,.03)}
tr.row-draft td{background:rgba(106,94,64,.02)}
tr.row-active td{background:rgba(45,90,48,.02)}
tr.row-former td{background:rgba(90,84,72,.02)}
.badge-clickable{cursor:pointer;user-select:none;transition:opacity .15s}
.badge-clickable:hover{opacity:.75}
.inv-num-link{color:var(--text);text-decoration:underline;cursor:pointer;font-weight:600}
.inv-num-link:hover{color:var(--gold)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:10px;padding:28px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.28);border:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:22px;color:var(--text);letter-spacing:-.01em}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;color:var(--text);background:var(--input);transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,152,42,.1)}
input[readonly]{background:var(--th);color:var(--muted)}
textarea{resize:vertical;min-height:68px}
input[type=file]{width:100%;font-size:13px;color:var(--dim)}
.file-hint{font-size:11px;color:var(--muted);margin-top:5px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border-light)}
.month-total td{background:var(--mo-total);font-weight:700}
.grand-total td{background:var(--grand);font-weight:700;border-top:2px solid var(--border)}
.empty{text-align:center;padding:52px 24px;color:var(--muted)}
.empty-icon{display:block;margin-bottom:14px;opacity:.35}
.empty-icon svg{width:40px;height:40px}
.empty p{font-size:13px}
.filters{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.filters label{text-transform:none;font-size:13px;color:var(--dim);margin:0;white-space:nowrap}
.filters select{width:auto}
.file-link{color:var(--gold);cursor:pointer;text-decoration:underline;font-size:12px}
.timeline{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.tl-item{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--th);border-radius:6px;font-size:12px}
.tl-date{color:var(--muted);margin-left:auto;font-size:11px}
.inv-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:18px;font-size:13px}
.inv-detail-grid dt{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.inv-detail-grid dd{font-weight:500}
.tpl-bar{font-size:12px;color:#4a7a50;background:rgba(74,122,80,.1);border:1px solid rgba(74,122,80,.2);border-radius:6px;padding:5px 10px;display:flex;align-items:center;gap:8px}
.chart-wrap{margin-bottom:20px;position:relative}
.chart-compare{font-size:12px;color:var(--muted);margin-top:6px;text-align:right;min-height:18px}
.chart-compare .up{color:#4a7a50;font-weight:600}
.chart-compare .down{color:#8a3030;font-weight:600}
#chartTooltip{display:none;position:fixed;background:#1c2b1e;color:#c8d5c9;border:1px solid var(--gold);padding:8px 12px;border-radius:6px;font-size:12px;pointer-events:none;z-index:999;line-height:1.7;white-space:nowrap}
#shortcutHint{position:fixed;bottom:12px;right:16px;font-size:11px;color:var(--muted);pointer-events:none;opacity:.5}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c2b1e;color:#c8d5c9;border:1px solid var(--gold);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:720px){
  .app{flex-direction:column;height:auto}
  .sidebar{width:100%;height:auto;padding:8px 0;display:flex;overflow-x:auto;flex-shrink:0}
  .sidebar-logo{display:none}
  .nav-item{white-space:nowrap;font-size:13px;border-left:none;border-bottom:3px solid transparent;border-radius:0;margin:0}
  .nav-item.active{border-bottom-color:var(--gold);border-left:none}
  .main{height:auto}
  .content{overflow:visible}
  .form-row{grid-template-columns:1fr}
  .section-title{font-size:18px}
  .topbar{flex-wrap:wrap;padding:10px 16px;gap:8px;min-height:auto}
  .topbar-right{gap:5px}
  .search-wrap input{width:100px}
  .search-wrap input:focus{width:150px}
}
.topbar.collapsed{min-height:32px;padding:0 14px}
.topbar.collapsed .topbar-right,.topbar.collapsed .app-title{display:none}
.topbar.collapsed #topbarToggle{display:flex}
#topbarToggle .chevron-icon{transition:transform .2s}
.topbar.collapsed #topbarToggle .chevron-icon{transform:rotate(180deg)}
.btn-generate{background:rgba(184,152,42,.1);color:#7a6010;border:1px solid rgba(184,152,42,.3)}
.btn-generate:hover{background:rgba(184,152,42,.2)}
@media print{
  body>*:not(#invoicePrintArea){display:none!important}
  #invoicePrintArea{display:block!important;padding:0;max-width:100%}
}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #4a6040;background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-key{width:72px;height:56px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e8e4da;font-size:20px;font-weight:500;cursor:pointer;transition:background .1s,transform .08s;font-family:inherit}
.pin-key:hover{background:rgba(255,255,255,.12)}
.pin-key:active{transform:scale(.94);background:rgba(184,152,42,.2)}
.pin-key.pin-key-ghost{background:transparent;border-color:transparent;font-size:14px;color:#7a8070}
.pin-key.pin-key-ghost:hover{color:var(--gold);background:transparent}
.pin-shake{animation:pinShake .35s ease}
@keyframes pinShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.period-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.period-tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .12s}
.period-tab.active{background:var(--accent);color:#e8f0e8;border-color:var(--accent)}
.period-tab:hover:not(.active){border-color:var(--gold);color:var(--gold)}
.period-custom{display:none;gap:8px;align-items:center;margin-bottom:16px}
.period-custom.visible{display:flex}
.period-custom input[type=month]{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--input);color:var(--text)}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;border-left:3px solid var(--card-accent,var(--border))}
.dash-card-value{font-size:28px;font-weight:700;letter-spacing:-.02em;color:var(--text);font-variant-numeric:tabular-nums}
.dash-card-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px;font-weight:600}
.dash-card-sub{font-size:12px;color:var(--muted);margin-top:6px}
.inv-count{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);background:var(--th);border-radius:12px;padding:2px 8px;cursor:pointer;transition:background .15s}
.inv-count:hover{background:var(--hover);color:var(--text)}
.inv-count-zero{opacity:.5}
</style>
</head>
<body>
<div id="pinOverlay" style="display:none;position:fixed;inset:0;background:var(--sidebar-bg);z-index:9999;align-items:center;justify-content:center;flex-direction:column">
  <div style="text-align:center;max-width:320px;width:100%;padding:32px">
    <div style="font-size:13px;font-weight:800;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">BUSINESS OS</div>
    <div id="pinTitle" style="font-size:20px;font-weight:700;color:#e8e4da;margin-bottom:6px">Enter PIN</div>
    <div id="pinSubtitle" style="font-size:13px;color:#7a8070;margin-bottom:32px">Enter your 4-digit PIN to continue</div>
    <div id="pinDots" style="display:flex;gap:16px;justify-content:center;margin-bottom:32px">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div id="pinPad" style="display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key pin-key-ghost" onclick="pinClear()" style="font-size:11px">CLEAR</button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key pin-key-ghost" onclick="pinBackspace()">⌫</button>
    </div>
    <div id="pinError" style="margin-top:20px;font-size:12px;color:#e08888;min-height:18px"></div>
    <div id="pinForgot" style="margin-top:16px;display:none;text-align:center">
      <button onclick="sendRecoveryCode()" style="background:none;border:none;color:#7a8070;font-size:12px;cursor:pointer;text-decoration:underline">Forgot PIN? Send recovery code to email</button>
    </div>
    <div id="pinEmailSetup" style="display:none;text-align:center">

function viewFile(coll,id){

  const w=window.open();

  else w.document.write(`<html><body style="margin:0;background:#111"><img src="${rec.file}" style="max-width:100%"></body></html>`);
}
function readFile(inputId,cb){

  if(!f){ cb(null,''); return; }

}

let _toastT;
function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('show'),2200); }

// ===== DURATION =====
function calcDuration(start,end,status){
  if(!start) return '—';
  const from=new Date(start);
  const to=(end&&status!=='Active')?new Date(end):new Date();
  let mos=(to.getFullYear()-from.getFullYear())*12+(to.getMonth()-from.getMonth());
  if(mos<0) mos=0;
  const yrs=Math.floor(mos/12), m=mos%12;
  const yw=yrs===1?t('dur_yr'):t('dur_yr_p'), mw=m===1?t('dur_mo'):t('dur_mo_p');
  if(yrs&&m) return `${yrs} ${yw} ${m} ${mw}`;
  if(yrs) return `${yrs} ${yw}`;
  return `${m} ${mw}`;
}

// ===== COPY MARKDOWN =====
function copyText(text){ navigator.clipboard.writeText(text).then(()=>showToast(t('toast_copied'))); }
function copyCompanyMD(id){
  const c=load('companies').find(r=>r.id===id); if(!c) return;
  const cts=load('contracts').filter(ct=>ct.companyId===id);
  let md=`## ${c.name}\n- **Status:** ${c.status}\n- **Country:** ${c.country||'—'}\n- **Contact:** ${c.contact||'—'}\n- **Start:** ${c.startDate||'—'}  **End:** ${c.endDate||'—'}\n- **Duration:** ${calcDuration(c.startDate,c.endDate,c.status)}\n`;
  if(c.notes) md+=`- **Notes:** ${c.notes}\n`;
  if(cts.length){ md+=`\n### Contracts\n`; cts.forEach(ct=>{ md+=`- **${ct.name}** | ${ct.currency} ${fmt(ct.monthlyRate,0)}/mo | ${ct.status}\n`; }); }
  copyText(md);
}
function copyInvoiceMD(id){
  const inv=load('invoices').find(r=>r.id===id); if(!inv) return;
  let md=`## Invoice ${inv.number}\n- **Company:** ${companyName(inv.companyId)}\n- **Date:** ${inv.issueDate||'—'}\n- **Amount:** ${fmt(inv.amount,0)} ${inv.currency}\n- **Rate:** ${inv.exchangeRate||'—'}\n- **GEL:** ${fmt(inv.amountGEL,2)}\n- **Tax 1%:** ${fmt(inv.tax,2)}\n- **Status:** ${inv.status}\n`;
  if(inv.notes) md+=`- **Notes:** ${inv.notes}\n`;
  copyText(md);
}
function copyDocumentMD(id){
  const d=load('documents').find(r=>r.id===id); if(!d) return;
  copyText(`## ${d.name}\n- **Type:** ${d.type}\n- **Country:** ${d.country||'—'}\n- **Issue:** ${d.issueDate||'—'}\n- **Expiry:** ${d.expiryDate||'—'}\n${d.notes?`- **Notes:** ${d.notes}\n`:''}`);
}
function copySummaryMD(){
  const yr=document.getElementById('sum-year')?.value||String(new Date().getFullYear());
  const invs=load('invoices').filter(i=>i.issueDate?.startsWith(yr)).sort((a,b)=>(a.issueDate||'').localeCompare(b.issueDate||''));
  if(!invs.length){ showToast('No data'); return; }
  let md=`# Income Summary ${yr}\n\n| Month | Company | Invoice # | Currency | Amount | Rate | GEL | Tax 1% |\n|---|---|---|---|---:|---:|---:|---:|\n`;
  let gG=0,gT=0;
  invs.forEach(inv=>{
    const mo=new Date((inv.issueDate||'2000-01')+'-02').toLocaleDateString('en-US',{year:'numeric',month:'long'});
    md+=`| ${mo} | ${companyName(inv.companyId)} | ${inv.number} | ${inv.currency} | ${fmt(inv.amount,0)} | ${inv.exchangeRate} | ${fmt(inv.amountGEL,2)} | ${fmt(inv.tax,2)} |\n`;
    gG+=inv.amountGEL||0; gT+=inv.tax||0;
  });
  md+=`| **Total** | | | | | | **${fmt(gG,2)}** | **${fmt(gT,2)}** |\n`;
  copyText(md);
}

// ===== EXPORT / IMPORT / CLEAR =====
function exportJSON(){
  const data={companies:load('companies'),contracts:load('contracts'),invoices:load('invoices'),documents:load('documents')};
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})),download:'business-os-backup.json'});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function triggerImport(){ document.getElementById('importFile').click(); }
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      ['companies','contracts','invoices','documents'].forEach(coll=>{
        if(!Array.isArray(data[coll])) return;
        const existing=load(coll), ids=new Set(existing.map(r=>r.id));
        save(coll,[...existing,...data[coll].filter(r=>!ids.has(r.id))]);
      });
      renderSection(S.section); showToast('Imported successfully');
    }catch{ alert('Invalid JSON file.'); }
    e.target.value='';
  };
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm(t('confirm_clear'))) return;
  ['companies','contracts','invoices','documents'].forEach(k=>localStorage.removeItem(KEY[k]));
  localStorage.removeItem(KEY.init); seedDemo(); renderSection(S.section);
}

// ===== SEARCH =====
function renderSearch(q){
  const dd=document.getElementById('searchDropdown');
  if(!q.trim()){ dd.style.display='none'; return; }
  const lq=q.toLowerCase();
  const results=[];
  load('companies').forEach(c=>{ if((c.name+c.country).toLowerCase().includes(lq)) results.push({sec:'companies',label:c.name,sub:c.country,id:c.id}); });
  load('contracts').forEach(c=>{ if((c.name+companyName(c.companyId)).toLowerCase().includes(lq)) results.push({sec:'contracts',label:c.name,sub:companyName(c.companyId),id:c.id}); });
  load('invoices').forEach(c=>{ if((c.number+companyName(c.companyId)).toLowerCase().includes(lq)) results.push({sec:'invoices',label:c.number,sub:companyName(c.companyId),id:c.id}); });
  load('documents').forEach(c=>{ if((c.name+c.type).toLowerCase().includes(lq)) results.push({sec:'documents',label:c.name,sub:c.type,id:c.id}); });
  if(!results.length){ dd.innerHTML=`<div class="search-no-results">${t('search_no_results')}</div>`; }
  else{ dd.innerHTML=results.slice(0,8).map(r=>`<div class="search-result" onclick="searchGoto('${r.sec}','${r.id}')"><span class="search-result-icon">${getIcon(r.sec,16)}</span><div class="search-result-text"><strong>${esc(r.label)}</strong><span>${esc(r.sub)}</span></div></div>`).join(''); }
  const rect=document.getElementById('searchInput').getBoundingClientRect();
  Object.assign(dd.style,{display:'block',left:rect.left+'px',top:(rect.bottom+4)+'px',width:Math.max(280,rect.width)+'px'});
}

// ===== INVOICE STATUS CYCLE =====
function cycleStatus(id){
  const rows=load('invoices'), inv=rows.find(r=>r.id===id); if(!inv) return;
  const cycle=['Draft','Sent','Paid'];
  const next=cycle[(cycle.indexOf(inv.status)+1)%cycle.length];
  const history=[...(inv.statusHistory||[{status:inv.status,date:new Date().toISOString()}])];
  history.push({status:next,date:new Date().toISOString()});
  inv.status=next; inv.statusHistory=history;
  rows[rows.findIndex(r=>r.id===id)]=inv;
  save('invoices',rows); renderInvoices();
}

function calcGEL(){
  const amount=parseFloat(document.getElementById('f-amount')?.value)||0;
  const rate=parseFloat(document.getElementById('f-rate')?.value)||0;
  const gel=amount*rate;
  const g=document.getElementById('f-gel'),tx=document.getElementById('f-tax');
  if(g) g.value=gel?gel.toFixed(2):'';
  if(tx) tx.value=gel?(gel*0.01).toFixed(2):'';
}

function saveInvoice(id){
  if(!validateForm([{id:'f-num',label:'Invoice number'},{id:'f-company',label:'Company'},{id:'f-date',label:'Issue date'},{id:'f-amount',label:'Amount'},{id:'f-rate',label:'Exchange rate'}])) return;
  const num=document.getElementById('f-num').value.trim();
  const rows=load('invoices'), existing=id?rows.find(r=>r.id===id):null;
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  const rate=parseFloat(document.getElementById('f-rate').value)||0;
  const gel=amount*rate;
  const newStatus=document.getElementById('f-status').value;
  let statusHistory=existing?.statusHistory||[];
  if(!id){ statusHistory=[{status:newStatus,date:new Date().toISOString()}]; }
  else if(newStatus!==existing?.status){ statusHistory=[...statusHistory,{status:newStatus,date:new Date().toISOString()}]; }
  readFile('f-file',(fd,fn)=>{
    const rec={id:id||uid(),number:num,
      companyId:document.getElementById('f-company').value,
      contractId:document.getElementById('f-contract').value,
      issueDate:document.getElementById('f-date').value,
      amount,currency:document.getElementById('f-currency').value,

      file:fd||existing?.file||null,fileName:fn||existing?.fileName||'',
      notes:document.getElementById('f-notes').value.trim()};

function drawBarChart(canvasId,data){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  canvas.width=canvas.offsetWidth;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const PAD={t:16,r:16,b:44,l:70};
  const cW=W-PAD.l-PAD.r, cH=H-PAD.t-PAD.b;
  const dark=document.documentElement.dataset.theme==='dark';
  const textC=dark?'#7a8070':'#7a7060';
  const gridC=dark?'#2a3028':'#ddd6c8';
  const barC=dark?'#4a7a50':'#2d4a30';
  ctx.clearRect(0,0,W,H);
  const maxGEL=Math.max(...data.map(d=>d.gel),1);
  const barW=Math.max(8,Math.min(50,cW/data.length-10));
  const step=cW/data.length;
  [0,.25,.5,.75,1].forEach(r=>{
    const y=PAD.t+cH*(1-r);
    ctx.strokeStyle=gridC; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(PAD.l+cW,y); ctx.stroke();
    ctx.fillStyle=textC; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText(fmt(maxGEL*r,0),PAD.l-6,y+4);
  });
  data.forEach((d,i)=>{
    const x=PAD.l+i*step+(step-barW)/2;
    const bH=cH*(d.gel/maxGEL);
    ctx.fillStyle=barC;
    ctx.fillRect(x,PAD.t+cH-bH,barW,bH);
    ctx.fillStyle=textC; ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.label,x+barW/2,PAD.t+cH+16);
  });
  canvas.onmousemove=e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const tt=document.getElementById('chartTooltip');
    let found=false;
    data.forEach((d,i)=>{
      const x=PAD.l+i*step+(step-barW)/2, bH=cH*(d.gel/maxGEL);
      if(mx>=x&&mx<=x+barW&&my>=PAD.t+cH-bH&&my<=PAD.t+cH){
        tt.style.display='block';
        tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-56)+'px';
        tt.innerHTML=`<strong>${d.label}</strong><br>GEL: ${fmt(d.gel,2)}<br>Tax: ${fmt(d.tax,2)}`;
        found=true;
      }
    });
    if(!found) tt.style.display='none';
  };
  canvas.onmouseleave=()=>{ document.getElementById('chartTooltip').style.display='none'; };
}

function exportCSV(){
  const yr=document.getElementById('sum-year')?.value||String(new Date().getFullYear());
  const invs=load('invoices').filter(i=>i.issueDate?.startsWith(yr)).sort((a,b)=>(a.issueDate||'').localeCompare(b.issueDate||''));
  const header=['Month','Company','Invoice #','Currency','Amount','Exchange Rate','GEL','Tax 1%','Status'];
  const csvRows=invs.map(inv=>{
    const mo=new Date((inv.issueDate||'2000-01')+'-02').toLocaleDateString('en-US',{year:'numeric',month:'long'});
    return [mo,companyName(inv.companyId),inv.number,inv.currency,inv.amount,inv.exchangeRate,inv.amountGEL,inv.tax,inv.status]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([[header.join(','),...csvRows].join('\n')],{type:'text/csv;charset=utf-8;'})),download:`income-${yr}.csv`});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

}
function updateSheetsSyncUI(){
  const hasUrl=!!localStorage.getItem('sheetsWebAppUrl');
  const btn=document.getElementById('syncSheetsBtn');
  if(btn) btn.style.display=hasUrl?'inline-flex':'none';
  const settingsBtn=document.getElementById('sheetsSettingsBtn');

async function testSheetsConnection(){
  const url=document.getElementById('sheetsUrlInput').value.trim();
  const result=document.getElementById('sheetsTestResult');
  if(!url){ result.textContent='⚠ Enter URL first'; return; }
  result.textContent='Testing...';
  try{
    const res=await fetch(url);
    const data=await res.json();
    result.textContent=data.status==='ok'?'✓ Connection OK':'⚠ Unexpected response: '+JSON.stringify(data);
    result.style.color=data.status==='ok'?'#2d6030':'#b04040';
  }catch(err){
    result.textContent='✗ Connection failed: '+err.message;
    result.style.color='#b04040';
  }
}
async function syncToSheets(){
  const url=localStorage.getItem('sheetsWebAppUrl');
  if(!url){ showToast('Set Google Sheets URL first'); return; }
  const btn=document.getElementById('syncSheetsBtn');
  if(btn){ btn.textContent='Syncing...'; btn.disabled=true; }
  try{
    const invoices=JSON.parse(localStorage.getItem('bos_invoices')||'[]');
    const companies=JSON.parse(localStorage.getItem('bos_companies')||'[]');
    const compMap={};
    companies.forEach(c=>{ compMap[c.id]=c.name; });
    const rows=invoices
      .filter(inv=>inv.status==='Paid'||inv.status==='Sent'||inv.status==='Draft')
      .sort((a,b)=>(a.issueDate||'').localeCompare(b.issueDate||''))
      .map(inv=>{
        const gel=parseFloat(inv.amountGEL)||(parseFloat(inv.amount)*parseFloat(inv.exchangeRate));
        const tax=parseFloat(inv.tax)||(gel*0.01);
        const d=new Date(inv.issueDate);
        const month=d.toLocaleString('en-US',{month:'long',year:'numeric'});
        return{month,company:compMap[inv.companyId]||'',invoiceNum:inv.number||'',
          currency:inv.currency||'',amount:parseFloat(inv.amount)||0,
          rate:parseFloat(inv.exchangeRate)||0,
          gel:Math.round(gel*100)/100,tax:Math.round(tax*100)/100,status:inv.status||''};
      });
    const totalGel=rows.reduce((s,r)=>s+r.gel,0);
    const totalTax=rows.reduce((s,r)=>s+r.tax,0);
    const payload={rows,totals:{gel:Math.round(totalGel*100)/100,tax:Math.round(totalTax*100)/100},syncedAt:new Date().toISOString()};
    await fetch(url,{method:'POST',body:JSON.stringify(payload),mode:'no-cors'});
    showToast(`Synced ${rows.length} invoices to Google Sheets — check your Sheet`);
    localStorage.setItem('sheetsLastSync',new Date().toISOString());
    updateLastSyncLabel();
  }catch(err){
    showToast('Sync failed: '+err.message);
  }finally{
    if(btn){
      btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg> Sync to Sheets`;
      btn.disabled=false;
    }
  }
}
function updateLastSyncLabel(){
  const lastSync=localStorage.getItem('sheetsLastSync');
  const label=document.getElementById('lastSyncLabel');
  if(label&&lastSync){
    const d=new Date(lastSync);
    label.textContent='Last sync: '+d.toLocaleString();
  }
}

// ===== PIN PROTECTION =====
let pinBuffer='', pinMode='enter', pinSetupFirst='';

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function initPIN(){
  if(sessionStorage.getItem('bosAuth')==='true'){ showApp(); return; }
  const hasPin=!!localStorage.getItem('bosPin');
  if(!hasPin){
    pinMode='setup';
    document.getElementById('pinTitle').textContent='Set PIN';
    document.getElementById('pinSubtitle').textContent='Choose a 4-digit PIN to protect your data';
  }else{
    pinMode='enter';
    document.getElementById('pinForgot').style.display='block';
  }
  document.getElementById('pinOverlay').style.display='flex';
  document.querySelector('.app').style.display='none';
}
function showApp(){
  document.getElementById('pinOverlay').style.display='none';
  document.querySelector('.app').style.display='flex';
}
function pinInput(digit){
  if(pinBuffer.length>=4) return;
  pinBuffer+=digit;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(()=>processPIN(),100);
}
function pinBackspace(){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); }
function pinClear(){ pinBuffer=''; updatePinDots(); }
function updatePinDots(){
  document.querySelectorAll('.pin-dot').forEach((dot,i)=>dot.classList.toggle('filled',i<pinBuffer.length));
}
async function processPIN(){
  const hash=await sha256(pinBuffer);
  if(pinMode==='setup'){
    pinSetupFirst=hash; pinBuffer=''; updatePinDots();
    pinMode='confirm';
    document.getElementById('pinTitle').textContent='Confirm PIN';
    document.getElementById('pinSubtitle').textContent='Enter PIN again to confirm';
    document.getElementById('pinError').textContent='';
    return;
  }
  if(pinMode==='confirm'){
    if(hash===pinSetupFirst){
      localStorage.setItem('bosPin',hash);
      sessionStorage.setItem('bosAuth','true');
      if(!localStorage.getItem('bosRecoveryEmail')){
        document.getElementById('pinPad').style.display='none';
        document.getElementById('pinDots').style.display='none';
        document.getElementById('pinEmailSetup').style.display='block';
        document.getElementById('pinTitle').textContent='Almost done!';
        document.getElementById('pinSubtitle').textContent='';
      } else { showApp(); }
    }else{
      pinError('PINs do not match. Try again.');
      pinMode='setup'; pinSetupFirst='';
      document.getElementById('pinTitle').textContent='Set PIN';
      document.getElementById('pinSubtitle').textContent='Choose a 4-digit PIN to protect your data';
    }
    return;
  }
  if(pinMode==='enter'){
    const stored=localStorage.getItem('bosPin');
    if(hash===stored){ sessionStorage.setItem('bosAuth','true'); showApp(); }
    else pinError('Incorrect PIN. Try again.');
  }
}
function pinError(msg){
  pinBuffer=''; updatePinDots();
  document.getElementById('pinError').textContent=msg;
  const dots=document.getElementById('pinDots');
  dots.classList.add('pin-shake');
  setTimeout(()=>dots.classList.remove('pin-shake'),400);
}
function resetPIN(){
  if(!confirm('This will delete your PIN and ALL data. Continue?')) return;
  localStorage.clear(); sessionStorage.clear(); location.reload();
}
function saveRecoveryEmail(){
  const email=document.getElementById('recoveryEmailInput').value.trim();
  if(!email||!email.includes('@')){document.getElementById('recoveryEmailInput').style.borderColor='#e08888';return;}
  localStorage.setItem('bosRecoveryEmail',email);
  showApp();
}
function skipRecoveryEmail(){ showApp(); }
let recoveryCodeSent=null;
async function sendRecoveryCode(){
  const email=localStorage.getItem('bosRecoveryEmail');
  if(!email){showRecoveryEmailInput();return;}
  const code=Math.floor(100000+Math.random()*900000).toString();
  recoveryCodeSent=code;
  const sheetsUrl=localStorage.getItem('sheetsWebAppUrl');
  if(sheetsUrl){try{await fetch(sheetsUrl+'?action=sendRecovery&email='+encodeURIComponent(email)+'&code='+code,{mode:'no-cors'});}catch(e){}}
  const mailtoUrl=`mailto:${email}?subject=Business OS Recovery Code&body=Your recovery code: ${code}%0A%0AEnter this code in the app to reset your PIN without losing data.`;
  document.getElementById('pinTitle').textContent='Check your email';
  document.getElementById('pinSubtitle').textContent=`Code sent to ${email.replace(/(.{2}).*(@)/,'$1***$2')}`;
  document.getElementById('pinDots').style.display='none';
  document.getElementById('pinPad').style.display='none';
  document.getElementById('pinForgot').innerHTML=`<div style="margin-top:16px">
    <input type="text" id="recoveryCodeInput" placeholder="Enter 6-digit code" maxlength="6"
      style="width:160px;padding:10px;text-align:center;font-size:18px;letter-spacing:.2em;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#e8e4da;font-family:inherit">
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
      <button class="pin-key" style="width:auto;padding:0 16px;font-size:13px" onclick="verifyRecoveryCode()">Verify</button>
      <button class="pin-key pin-key-ghost" style="width:auto;font-size:12px" onclick="location.reload()">Cancel</button>
    </div>
    <div style="margin-top:10px"><a href="${mailtoUrl}" style="color:#7a8070;font-size:11px;text-decoration:underline">Open email client</a></div>
    <div id="recoveryError" style="color:#e08888;font-size:12px;margin-top:8px"></div>
  </div>`;
}
async function verifyRecoveryCode(){
  const input=document.getElementById('recoveryCodeInput').value.trim();
  if(input===recoveryCodeSent){
    localStorage.removeItem('bosPin'); sessionStorage.removeItem('bosAuth'); recoveryCodeSent=null;
    pinMode='setup'; pinSetupFirst=''; pinBuffer='';
    document.getElementById('pinTitle').textContent='Set New PIN';
    document.getElementById('pinSubtitle').textContent='Your data is safe. Set a new PIN.';
    document.getElementById('pinDots').style.display='flex';
    document.getElementById('pinPad').style.display='grid';
    document.getElementById('pinForgot').innerHTML='';
    document.getElementById('pinError').textContent='';
    updatePinDots();
  }else{
    document.getElementById('recoveryError').textContent='Incorrect code. Try again.';
  }
}
function showRecoveryEmailInput(){
  document.getElementById('pinForgot').innerHTML=`<div style="margin-top:16px;text-align:center">
    <div style="font-size:12px;color:#7a8070;margin-bottom:10px">No recovery email saved.<br>Enter your email to receive a code:</div>
    <input type="email" id="recoveryEmailLate" placeholder="your@email.com"
      style="width:200px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#e8e4da;font-size:13px;text-align:center;font-family:inherit">
    <div style="margin-top:8px;display:flex;gap:6px;justify-content:center">
      <button class="pin-key" style="width:auto;padding:0 14px;font-size:12px" onclick="saveEmailAndSend()">Send code</button>
      <button class="pin-key pin-key-ghost" style="font-size:11px;width:auto" onclick="hardResetPIN()">Reset &amp; clear data</button>

}
function saveEmailAndSend(){
  const email=document.getElementById('recoveryEmailLate')?.value?.trim();
  if(!email||!email.includes('@'))return;
  localStorage.setItem('bosRecoveryEmail',email);
  sendRecoveryCode();
}
function hardResetPIN(){
  if(!confirm('This will delete your PIN AND ALL DATA. This cannot be undone. Continue?'))return;
  localStorage.clear(); sessionStorage.clear(); location.reload();
}
function changePIN(){
  if(!confirm('Change PIN? You will need to enter a new one.')) return;
  localStorage.removeItem('bosPin'); sessionStorage.removeItem('bosAuth');
  pinMode='setup'; pinSetupFirst=''; pinBuffer=''; updatePinDots();

  document.getElementById('pinError').textContent='';
  document.getElementById('pinOverlay').style.display='flex';
  document.querySelector('.app').style.display='none';
}

// ===== DASHBOARD =====
function getPeriodRange(){
  const now=new Date();
  const period=localStorage.getItem('dashPeriod')||'year';
  if(period==='month') return {from:new Date(now.getFullYear(),now.getMonth(),1),to:new Date(now.getFullYear(),now.getMonth()+1,0)};
  if(period==='quarter'){const q=Math.floor(now.getMonth()/3);return {from:new Date(now.getFullYear(),q*3,1),to:new Date(now.getFullYear(),q*3+3,0)};}
  if(period==='custom'){const df=localStorage.getItem('dashFrom'),dt=localStorage.getItem('dashTo');if(df&&dt)return {from:new Date(df),to:new Date(dt+'-31')};}
  return {from:new Date(now.getFullYear(),0,1),to:new Date(now.getFullYear(),11,31)};
}
function setDashPeriod(period){
  localStorage.setItem('dashPeriod',period);
  renderDashboard();
}
function saveDashCurrency(){
  localStorage.setItem('dashCurrency',document.getElementById('dashCurrency').value);
  renderDashboard();
}
function applyCustomPeriod(){
  const fromEl=document.getElementById('dashFrom'),toEl=document.getElementById('dashTo');
  const from=fromEl?.value,to=toEl?.value;
  const err=document.getElementById('periodError');
  if(fromEl) fromEl.style.borderColor='';
  if(toEl) toEl.style.borderColor='';
  if(err) err.style.display='none';
  if(!from){if(fromEl)fromEl.style.borderColor='#e08888';if(err){err.textContent='Select From date';err.style.display='inline';}return;}
  if(!to){if(toEl)toEl.style.borderColor='#e08888';if(err){err.textContent='Select To date';err.style.display='inline';}return;}
  if(from>to){if(toEl)toEl.style.borderColor='#e08888';if(err){err.textContent='"To" must be after "From"';err.style.display='inline';}return;}
  const [fy,fm]=from.split('-').map(Number),[ty,tm]=to.split('-').map(Number);
  if((ty-fy)*12+(tm-fm)>24){if(err){err.textContent='Maximum range is 24 months';err.style.display='inline';}return;}
  localStorage.setItem('dashFrom',from);localStorage.setItem('dashTo',to);
  localStorage.setItem('dashPeriod','custom');renderDashboard();
}

      <div class="dash-card-sub">${t('bonus_not_official')} · ${bonusInPeriod.length} ${bonusInPeriod.length===1?'entry':'entries'}</div>
    </div>`;
  if(currKeys.length){
    html+=`<div class="card" style="margin-bottom:16px;border-left:3px solid #4a7a50">
      <div style="padding:16px 20px 4px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Income by currency (paid)</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Currency</th><th class="text-right">Amount</th><th class="text-right">GEL</th><th class="text-right">Tax 1%</th></tr></thead>
        <tbody>${currKeys.map(cur=>{const v=byCurr[cur];const sym=csym[cur]||'';return `<tr><td><strong>${cur}</strong></td><td class="text-right">${fmt(v.amount,0)} ${sym}</td><td class="text-right">${cur==='GEL'?'—':fmt(v.gel,2)+' GEL'}</td><td class="text-right">${fmt(v.tax,2)}</td></tr>`;}).join('')}</tbody>
      </table></div></div>`;
  }
  if(recent.length){
    html+=`<div class="card" style="margin-bottom:16px">
      <div style="padding:16px 20px 4px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Recent invoices</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Invoice #</th><th>Company</th><th class="text-right">Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${recent.map(inv=>`<tr style="cursor:pointer" onclick="navigate('invoices')">
          <td><strong>${esc(inv.number)}</strong></td><td>${esc(companyName(inv.companyId))}</td>
          <td class="text-right">${fmt(inv.amount,0)} ${inv.currency}</td>
          <td>${badge(inv.status)}</td><td>${inv.issueDate||'—'}</td></tr>`).join('')}</tbody>
      </table></div></div>`;
  }
  if(remItems.length){
    html+=`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">${remItems.map(it=>`<div class="banner ${it.cls}" style="border-radius:8px">${it.txt}</div>`).join('')}</div>`;
  }
  document.getElementById('section-dashboard').innerHTML=html;
}

// ===== BONUSES =====
function renderBonuses(){
  const all=JSON.parse(localStorage.getItem('bos_bonuses')||'[]');
  const admin=isAdmin();
  const nowY=String(new Date().getFullYear());
  const allYears=[...new Set(all.map(r=>r.date?.slice(0,4)).filter(Boolean))].sort().reverse();
  const years=[...new Set([...allYears,nowY])].sort().reverse();
  const selectedYear=document.getElementById('bonus-year')?.value||nowY;
  const yearOpts=years.map(y=>`<option${y===selectedYear?' selected':''}>${y}</option>`).join('');
  const filtered=all.filter(r=>r.date?.startsWith(selectedYear)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  let html=`<div class="section-header"><h1 class="section-title">${t('nav_bonuses')}</h1>
    <div class="section-header-actions">
      ${admin?`<button class="btn btn-primary" onclick="openBonus()">${getIcon('plus',14)} ${t('btn_add')}</button>`:''}
    </div></div>
    <div class="filters"><label>${t('lbl_year')}</label><select id="bonus-year" onchange="renderBonuses()">${yearOpts}</select></div>`;
  if(!filtered.length){
    html+=`<div class="empty"><span class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><p>No bonuses for ${esc(selectedYear)}.</p></div>`;
  } else {
    const totalAmount=filtered.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
    const avgPerMonth=totalAmount/12;
    html+=`<div class="card" style="border-left:3px solid #7a5a2a"><div class="table-wrap"><table>
      <thead><tr><th>${t('col_date')}</th><th>${t('bonus_source')}</th><th>${t('bonus_type')}</th>
        <th class="text-right">Amount</th><th>${t('col_notes')}</th>${admin?'<th></th>':''}</tr></thead>
      <tbody>${filtered.map(r=>`<tr>
        <td>${r.date||'—'}</td><td>${esc(r.source||'—')}</td><td>${esc(r.type||'—')}</td>
        <td class="text-right">${fmt(r.amount,0)} ${r.currency||'USD'}</td>
        <td class="td-notes">${esc(r.notes||'—')}</td>
        ${admin?`<td class="td-actions"><div class="action-cell">${editBtn(`openBonus('${r.id}')`)}${delBtn(`deleteBonus('${r.id}')`)}</div></td>`:''}</tr>`).join('')}</tbody>
      <tfoot><tr class="grand-total">
        <td colspan="3" class="text-right">Total ${esc(selectedYear)} · avg/month:</td>
        <td class="text-right">${fmt(totalAmount,0)} · ${fmt(avgPerMonth,0)}</td>
        <td${admin?' colspan="2"':''}><small style="color:var(--muted)">${t('bonus_not_official')}</small></td>
      </tr></tfoot>
    </table></div></div>`;
  }
  document.getElementById('section-bonuses').innerHTML=html;
}
function openBonus(id){
  const rows=JSON.parse(localStorage.getItem('bos_bonuses')||'[]');
  const b=id?rows.find(r=>r.id===id):null;
  showModal(id?'Edit Bonus':'Add Bonus',`
    <div class="form-row">
      <div class="form-group"><label>${t('col_date')}</label><input type="date" id="f-date" value="${b?.date||''}">
        <div id="f-date_err" style="display:none;font-size:11px;color:#e08888;margin-top:3px"></div></div>
      <div class="form-group"><label>${t('bonus_type')}</label><select id="f-type">${['Bonus','Gift','Referral','Other'].map(tp=>`<option${b?.type===tp?' selected':''}>${tp}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>${t('bonus_source')}</label><input id="f-source" maxlength="80" value="${esc(b?.source||'')}">
      <div id="f-source_err" style="display:none;font-size:11px;color:#e08888;margin-top:3px"></div></div>
    <div class="form-row">
      <div class="form-group"><label>Amount</label><input type="number" id="f-amount" value="${b?.amount||''}">
        <div id="f-amount_err" style="display:none;font-size:11px;color:#e08888;margin-top:3px"></div></div>
      <div class="form-group"><label>${t('col_currency')}</label><select id="f-currency">${['USD','EUR','GBP'].map(c=>`<option${(b?.currency||'USD')===c?' selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="form-group"><label>${t('col_notes')}</label><textarea id="f-notes" maxlength="500">${esc(b?.notes||'')}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">${t('btn_cancel')}</button>
      <button class="btn btn-primary" onclick="saveBonus('${id||''}')">${t('btn_save')}</button>
    </div>`);
}
function saveBonus(id){
  if(!validateForm([{id:'f-date',label:'Date'},{id:'f-source',label:'Source'},{id:'f-amount',label:'Amount'}])) return;
  const date=document.getElementById('f-date').value;
  const amount=parseFloat(document.getElementById('f-amount').value)||0;
  const rows=JSON.parse(localStorage.getItem('bos_bonuses')||'[]');
  const rec={id:id||uid(),date,source:document.getElementById('f-source').value.trim(),
    type:document.getElementById('f-type').value,amount,
    currency:document.getElementById('f-currency').value,
    notes:document.getElementById('f-notes').value.trim()};
  if(id){const i=rows.findIndex(r=>r.id===id);rows[i]=rec;}else rows.push(rec);
  localStorage.setItem('bos_bonuses',JSON.stringify(rows));
  closeModal();renderBonuses();
}
function deleteBonus(id){
  if(!confirm('Delete this bonus entry?'))return;
  const rows=JSON.parse(localStorage.getItem('bos_bonuses')||'[]').filter(r=>r.id!==id);
  localStorage.setItem('bos_bonuses',JSON.stringify(rows));
  renderBonuses();
}

// ===== FORM VALIDATION =====
function validateForm(fields){
  let valid=true;
  fields.forEach(f=>{
    const el=document.getElementById(f.id);
    const val=el?.value?.trim();
    const err=document.getElementById(f.id+'_err');
    if(!val){
      if(el)el.style.borderColor='#e08888';
      if(err){err.textContent=(f.label||f.id)+' is required';err.style.display='block';}
      valid=false;
    }else{
      if(el)el.style.borderColor='';
      if(err)err.style.display='none';
    }
  });
  return valid;
}
function validateDateRange(startId,endId){
  const s=document.getElementById(startId)?.value,e=document.getElementById(endId)?.value;
  if(s&&e&&e<s){document.getElementById(endId).style.borderColor='#e08888';return false;}
  const el=document.getElementById(endId);if(el)el.style.borderColor='';return true;
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown',e=>{
  // PIN overlay gets priority
  if(document.getElementById('pinOverlay').style.display==='flex'){
    if(e.key>='0'&&e.key<='9'){ pinInput(e.key); return; }
    if(e.key==='Backspace'){ pinBackspace(); return; }
    return;
  }
  const tag=document.activeElement?.tagName;
  const inInput=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
  if(e.key==='Escape'){ closeModal(); document.getElementById('searchDropdown').style.display='none'; }
  if((e.metaKey||e.ctrlKey)&&e.key==='f'){ e.preventDefault(); document.getElementById('searchInput').focus(); }
  if(e.key==='n'&&!inInput&&!document.getElementById('modalOverlay').classList.contains('open')&&isAdmin()){
    const openers={companies:openCompany,contracts:openContract,invoices:openInvoice,documents:openDocument,bonuses:openBonus};
    openers[S.section]?.();
  }
});
document.addEventListener('click',e=>{
  if(!e.target.closest('#searchDropdown')&&!e.target.closest('#searchInput'))
    document.getElementById('searchDropdown').style.display='none';
});
